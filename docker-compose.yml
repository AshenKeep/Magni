version: "3.9"

# Magni v0.0.1
# This stack exposes backend on port 8000 and frontend on port 3000.
# Place your own reverse proxy (Nginx Proxy Manager, Traefik, Cloudflare Tunnel, etc.)
# in front of these ports. Your proxy MUST handle TLS — the app requires HTTPS.

services:
  db:
    image: postgres:16-alpine
    container_name: magni_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-magni}
      POSTGRES_USER: ${POSTGRES_USER:-magni}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-magni}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - magni_internal
    labels:
      com.magni.version: "0.0.1"
      com.magni.service: "database"

  redis:
    image: redis:7-alpine
    container_name: magni_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - magni_internal
    labels:
      com.magni.version: "0.0.1"
      com.magni.service: "cache"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: magni_backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-magni}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-magni}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      APP_URL: ${APP_URL}
      ENVIRONMENT: ${ENVIRONMENT:-production}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - magni_internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      com.magni.version: "0.0.1"
      com.magni.service: "backend"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${APP_URL}
    container_name: magni_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    networks:
      - magni_internal
    labels:
      com.magni.version: "0.0.1"
      com.magni.service: "frontend"

volumes:
  postgres_data:
  redis_data:

networks:
  magni_internal:
    driver: bridge
