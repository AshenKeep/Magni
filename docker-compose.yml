version: "3.9"

# Magni v0.0.12
# Single backend container serves the API, React dashboard, and runs scheduled backups.
# Reverse proxy points everything at port 8000.
# Postgres and Redis volumes MUST be local — do not mount over CIFS.
#
# CIFS volumes (backup_data, media_data) read from .env:
#   CIFS_PATH, CIFS_USERNAME, CIFS_PASSWORD       — backup NAS share
#   MEDIA_CIFS_PATH, MEDIA_CIFS_USERNAME, MEDIA_CIFS_PASSWORD — media NAS share
#
# If you don't want CIFS for media, set MEDIA_CIFS_PATH= (empty) and
# media_data will be a plain local volume.

services:
  db:
    image: postgres:16-alpine
    container_name: magni_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-magni}
      POSTGRES_USER: ${POSTGRES_USER:-magni}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-magni}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - magni_internal
    labels:
      com.magni.version: "0.0.12"
      com.magni.service: "database"

  redis:
    image: redis:7-alpine
    container_name: magni_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - magni_internal
    labels:
      com.magni.version: "0.0.12"
      com.magni.service: "cache"

  backend:
    image: ghcr.io/ashenkeep/magni-backend:latest
    container_name: magni_backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8443}:${BACKEND_PORT:-8443}"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-magni}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-magni}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      APP_URL: ${APP_URL}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      TZ: ${TZ:-UTC}
      BACKUP_SCHEDULE: ${BACKUP_SCHEDULE:-0 2 * * *}
      BACKUP_DIR: /backups
      MEDIA_STORAGE: ${MEDIA_STORAGE:-external}
      MEDIA_DIR: /media/exercises
      MEDIA_CIFS_PATH: ${MEDIA_CIFS_PATH:-}
      # TLS — set both to enable HTTPS. Leave blank for plain HTTP or behind a reverse proxy.
      SSL_CERTFILE: ${SSL_CERTFILE:-}
      SSL_KEYFILE: ${SSL_KEYFILE:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backup_data:/backups
      - media_data:/media/exercises
      # TLS certs — only needed when SSL_CERTFILE/SSL_KEYFILE are set in .env.
      # Run ./scripts/gen-certs.sh to create. Directory is created below to avoid
      # docker compose errors when it doesn't exist yet.
      - ./certs:/certs:ro
    networks:
      - magni_internal
    healthcheck:
      # Tries HTTPS first (port 8443 with -k to allow self-signed), falls back to HTTP (port 8000)
      test: ["CMD", "curl", "-fsk", "https://localhost:${BACKEND_PORT:-8443}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      com.magni.version: "0.0.12"
      com.magni.service: "backend"

volumes:
  # Local volumes — must stay on local filesystem, never CIFS
  postgres_data:
  redis_data:

  # Backup volume — CIFS NAS share
  # Set CIFS_PATH, CIFS_USERNAME, CIFS_PASSWORD in .env
  backup_data:
    driver: local
    driver_opts:
      type: cifs
      device: "${CIFS_PATH}"
      o: "username=${CIFS_USERNAME},password=${CIFS_PASSWORD},uid=1000,gid=1000"

  # Media volume — exercise GIFs
  # MEDIA_STORAGE=external or local: leave as plain local volume below (no changes needed)
  # MEDIA_STORAGE=cifs: set MEDIA_CIFS_PATH, MEDIA_CIFS_USERNAME, MEDIA_CIFS_PASSWORD in .env
  #                     and uncomment the cifs block below, commenting out the plain block
  #
  # --- Plain local volume (default) ---
  media_data:
  #
  # --- CIFS NAS volume (uncomment and fill in, or just set vars in .env and use this block) ---
  # media_data:
  #   driver: local
  #   driver_opts:
  #     type: cifs
  #     device: "${MEDIA_CIFS_PATH}"
  #     o: "username=${MEDIA_CIFS_USERNAME},password=${MEDIA_CIFS_PASSWORD},uid=1000,gid=1000"

networks:
  magni_internal:
    driver: bridge
